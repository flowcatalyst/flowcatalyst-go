version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - revive
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        # Two revive rules are intentionally NOT enabled:
        #  - `exported` (doc comment on every exported symbol) flagged ~1.5k
        #    internal symbols the codebase never documented; we don't require it.
        #  - `var-naming` wants exported OpenApi*→OpenAPI* renames (incl. a
        #    pkg/fcsdk SDK const + wire DTOs). "OpenApi" is the consistent house
        #    spelling; renaming would break the API, so we keep it.
        - name: error-return
        - name: error-naming
        - name: indent-error-flow
    errcheck:
      # Fire-and-forget cleanup: deferred Close/Rollback and best-effort
      # stdout writes. Their errors aren't actionable.
      exclude-functions:
        - (io.Closer).Close
        - (net/http.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (github.com/jackc/pgx/v5.BatchResults).Close
        - (github.com/jackc/pgx/v5.Tx).Rollback
        - (*go.mongodb.org/mongo-driver/mongo.Cursor).Close
        - fmt.Fprintf
    gosec:
      excludes:
        - G104  # audit errors not checked — we use revive's error-return instead
        - G115  # int conversion overflow — handled by pgx
        - G117  # struct fields named *Token/*Secret are serialized deliberately
                # (webhook payloads, OAuth token responses, credential files) —
                # marshaling them is the contract, not a leak
  # golangci-lint v2 moved path exclusions out of the top-level `issues:` block
  # (v1's `issues.exclude-dirs`) into `linters.exclusions.paths`. Using the old
  # key fails `golangci-lint config verify`, which is what was reddening CI.
  exclusions:
    paths:
      - internal/db/gen     # go-jet generated code
      - pkg/fcsdk/examples  # illustrative demo programs, not shipped
    rules:
      # Test fixtures intentionally use fake credentials, insecure cookies, and
      # fixed file modes, fabricate http responses with no body to close, and
      # use helpers whose params are constant within the suite; gosec +
      # bodyclose + unparam findings there are noise.
      - linters: [gosec, bodyclose, unparam]
        path: _test\.go

formatters:
  enable:
    - gofumpt
    - goimports
