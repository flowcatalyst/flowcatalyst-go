version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: standard
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - gosec
    - misspell
    - revive
    - unparam
    - whitespace
  settings:
    revive:
      rules:
        # `exported` (doc comment on every exported symbol) is intentionally
        # NOT enabled — the codebase doesn't document internal exported types
        # and we don't require it; enforcing it meant ~1.5k low-value comments.
        - name: var-naming
          severity: warning
        - name: error-return
        - name: error-naming
        - name: indent-error-flow
    gosec:
      excludes:
        - G104  # audit errors not checked — we use revive's error-return instead
        - G115  # int conversion overflow — handled by pgx
        - G117  # struct fields named *Token/*Secret are serialized deliberately
                # (webhook payloads, OAuth token responses, credential files) —
                # marshaling them is the contract, not a leak
  # golangci-lint v2 moved path exclusions out of the top-level `issues:` block
  # (v1's `issues.exclude-dirs`) into `linters.exclusions.paths`. Using the old
  # key fails `golangci-lint config verify`, which is what was reddening CI.
  exclusions:
    paths:
      - internal/db/gen     # go-jet generated code
      - pkg/fcsdk/examples  # illustrative demo programs, not shipped
    rules:
      # Test fixtures intentionally use fake credentials, insecure cookies, and
      # fixed file modes, and fabricate http responses with no body to close;
      # gosec + bodyclose findings there are noise.
      - linters: [gosec, bodyclose]
        path: _test\.go

formatters:
  enable:
    - gofumpt
    - goimports
