# Local/example stack for the unified fc-server. Postgres + Redis carry
# healthchecks; fc-server waits for Postgres to be healthy, then runs
# migrations + seed on boot and serves the API (+ embedded dashboard) on 8080.
#
#   docker compose up --build
#
# NOTE: this is a deployment scaffold, not the zero-config dev loop — use
# `fc-dev start` (embedded Postgres) for local development. For a real
# deployment, supply persistent FLOWCATALYST_APP_KEY + JWT signing key (see the
# fc-server service env) and bootstrap-admin credentials.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowcatalyst
      POSTGRES_PASSWORD: flowcatalyst
      POSTGRES_DB: flowcatalyst
    ports:
      - "5432:5432"
    volumes:
      - fc-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcatalyst -d flowcatalyst"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Required only when FC_STANDBY_ENABLED=true (HA leader election). Kept here
  # so the example stack is HA-ready; harmless when standby is off.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  fc-server:
    build:
      context: .
      args:
        VERSION: compose
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FC_API_PORT: "8080"
      FC_DATABASE_URL: "postgresql://flowcatalyst:flowcatalyst@postgres:5432/flowcatalyst?sslmode=disable"
      FC_PLATFORM_ENABLED: "true"
      FC_STANDBY_REDIS_URL: "redis://redis:6379"
      # ── Set these for a real deployment (placeholders boot but won't persist
      # OAuth client secrets / JWTs across restarts) ──
      # FLOWCATALYST_APP_KEY: "CHANGE-ME — openssl rand -base64 32"
      # FC_JWT_SIGNING_KEY_PEM: "-----BEGIN PRIVATE KEY----- ..."
      # FC_BOOTSTRAP_ADMIN_EMAIL / FC_BOOTSTRAP_ADMIN_PASSWORD
    ports:
      - "8080:8080"
      - "9090:9090"
    healthcheck:
      # GET (not --spider/HEAD): /health is GET-only, so a HEAD probe 405s.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3

volumes:
  fc-pgdata:
