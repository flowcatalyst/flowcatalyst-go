name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: flowcatalyst
          POSTGRES_PASSWORD: flowcatalyst
          POSTGRES_DB: flowcatalyst_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      # `make build` builds the embedded Vue SPA, which needs pnpm + node.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        run: make build

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration
        env:
          POSTGRES_URL: postgres://flowcatalyst:flowcatalyst@localhost:5432/flowcatalyst_test?sslmode=disable

      - name: Custom UoW seal analyzer
        run: make analyze

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      # frontend/embed.go has `//go:embed all:dist`. We don't build the SPA
      # for linting, but the embed needs >=1 file under frontend/dist or the
      # package fails to typecheck — which aborts golangci's package load and
      # masks every other finding. Drop in a placeholder so all packages load
      # and the real linters run. (frontend/dist is gitignored; this stub is
      # CI-only and never committed.)
      - name: Stub embedded SPA dir so the embed typechecks
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep
      # v7 installs golangci-lint v2 (matches the v2 .golangci.yml and is
      # built with a Go new enough for the repo's go1.26). Timeout comes from
      # .golangci.yml (run.timeout).
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  parity-spec:
    runs-on: ubuntu-latest
    continue-on-error: true  # allowlist-driven until phase 3 completes
    steps:
      - uses: actions/checkout@v4
      - run: echo "parity spec diff job — wired up in Phase 3 with oasdiff"
